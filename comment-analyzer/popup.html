<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #6e6e6e;
      --border: #e8e8e8;
      --accent: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --text: #e5e5e7;
        --text-secondary: #a1a1a6;
        --border: #2c2c2e;
        --accent: #e5e5e7;
      }
    }
    body {
      width: 380px; max-height: 600px; overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text); padding: 16px;
      margin: 0; font-size: 13px;
    }
    h2 { font-size: 16px; margin: 0 0 4px; }
    .sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .quota { font-size: 11px; color: var(--text-secondary); margin-bottom: 12px; text-align: center; }
    .btn {
      width: 100%; padding: 12px; background: var(--accent); color: var(--bg);
      border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; margin-bottom: 12px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-area { font-size: 13px; line-height: 1.6; }
    .card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; margin-bottom: 8px;
    }
    .card h3 { font-size: 12px; font-weight: 600; margin: 0 0 6px; }
    .tag { display: inline-block; background: #f3f3f3; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px 4px 2px 0; }
    .loading { text-align: center; color: var(--text-secondary); padding: 20px; }
    .error { color: #c0392b; background: #fef5f5; padding: 10px; border-radius: 6px; }
    .pay-card { text-align: center; }
    .pay-card p { margin: 8px 0; }
    .pay-card img { width: 120px; height: 120px; border-radius: 8px; border: 1px solid #ddd; }
    .activate-input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; text-align: center; background: var(--bg); color: var(--text); }
    .activate-btn { padding: 8px 16px; border: none; border-radius: 6px; background: var(--accent); color: var(--bg); cursor: pointer; font-weight: 500; }
  </style>
</head>
<body>
  <h2>竞品评论分析</h2>
  <p class="sub">自动分析当前页面评论区</p>
  <div class="quota" id="quotaDisplay">今日剩余 <strong id="remainCount">3</strong> 次</div>
  <button class="btn" id="analyzeBtn">分析当前笔记评论区</button>
  <div id="resultArea"></div>
  <script src="popup.js"></script>
</body>
</html>
